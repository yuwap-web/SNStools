name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Prepare docs folder
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r frontend/dist/* docs/

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git commit -m "Build: Update docs folder with latest frontend build" || true
          git push

      - name: GitHub Pages status
        run: echo "✅ Frontend deployed to GitHub Pages at https://yuwap-web.github.io/SNStools/"
